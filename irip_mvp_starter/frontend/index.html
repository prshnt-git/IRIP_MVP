    <!--
      Preconnect to the Render backend so the first API call
      (fetchHealth + fetchProducts) skips DNS + TCP + TLS handshake delay.
      This directly improves LCP by ~200-400ms on cold page loads.
    -->
    <link rel="preconnect" href="https://irip-api.onrender.com" crossorigin />
    <link rel="dns-prefetch" href="https://irip-api.onrender.com" />

    <title>IRIP — India Review Intelligence Platform</title>
  </head>
